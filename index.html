<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0f172a">
<meta name="description" content="نظام إدارة المخزن">
<title>Second Grade</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--blue:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#ea580c;--gray:#64748b;--dark:#0f172a;--surface:#f8fafc;--border:#e2e8f0;--text:#1e293b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--surface);display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;color:var(--text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes floatAnim{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.offline-banner{display:none;background:#fee2e2;color:#b91c1c;padding:4px 14px;font-weight:700;font-size:13px;text-align:center;border-bottom:2px solid #ef4444;flex-shrink:0}
.offline-banner.show{display:block}
#nameScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a,#1e3a5f,#0f172a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;background-image:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(37,99,235,.18) 0%,transparent 70%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(22,163,74,.07) 0%,transparent 60%)}
#nameScreen.hidden{display:none}
.ns-logo{font-size:60px;margin-bottom:10px;animation:floatAnim 3s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(37,99,235,.5))}
.ns-title{color:white;font-size:26px;font-weight:900;margin-bottom:4px;letter-spacing:-0.5px}
.ns-sub{color:#94a3b8;font-size:13px;margin-bottom:32px}
.ns-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:20px;padding:30px 24px;width:100%;max-width:340px;backdrop-filter:blur(16px)}
.ns-label{display:block;color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:8px}
.ns-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:13px 15px;font-size:16px;color:white;font-family:inherit;margin-bottom:16px;outline:none;transition:border-color .2s,background .2s}
.ns-input:focus{border-color:#3b82f6;background:rgba(59,130,246,.1)}
.ns-btn{width:100%;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:white;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(37,99,235,.4);transition:transform .15s,box-shadow .15s}
.ns-btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(37,99,235,.3)}
.ns-error{color:#fca5a5;font-size:12px;text-align:center;margin-top:8px;min-height:18px}
.app-header{background:var(--dark);color:white;padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.header-title{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:7px}
.header-user-chip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.1);border-radius:20px;padding:5px 12px;cursor:pointer;transition:background .15s;font-size:13px;font-weight:700}
.header-user-chip:hover{background:rgba(255,255,255,.15)}
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:11px;background:rgba(255,255,255,0.08);border-radius:12px;padding:4px 9px;color:#94a3b8}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#94a3b8}
.sync-dot.online{background:#22c55e;box-shadow:0 0 6px #22c55e}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
.notif-banner{display:none;background:#fef3c7;border-bottom:2px solid #f59e0b;padding:6px 14px;font-size:12.5px;font-weight:700;color:#92400e;align-items:center;gap:8px;flex-shrink:0}
.notif-banner.show{display:flex}
.notif-dismiss{margin-right:auto;cursor:pointer;font-size:14px}
.search-bar{background:white;padding:8px 12px;border-bottom:2px solid var(--blue);display:flex;gap:8px;align-items:center;flex-shrink:0}
.search-bar input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:14px;background:var(--surface);outline:none;font-family:inherit;transition:border-color .2s,background .2s}
.search-bar input:focus{border-color:var(--blue);background:white}
.search-clear{background:var(--red);color:white;border:none;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:bold;cursor:pointer;display:none;font-family:inherit}
.search-count{font-size:12px;color:var(--gray);white-space:nowrap;min-width:60px;text-align:center}
.toolbar{background:white;padding:6px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.toolbar-top-row{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap}
.toolbar-top-row button{flex:1 0 auto;border-radius:9px;padding:7px 4px;cursor:pointer;font-weight:700;border:1.5px solid transparent;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:48px;transition:filter .15s,transform .1s}
.toolbar-top-row button:active{transform:scale(.94)}
.btn-icon{font-size:17px;line-height:1}
.btn-lbl{font-size:9.5px;font-weight:700;line-height:1}
.menu-toggle-btn{background:var(--dark)!important;color:white!important}
.menu-toggle-btn.open{background:var(--blue)!important}
.btn-primary{background:var(--blue);color:white}
.btn-success{background:var(--green);color:white}
.btn-danger{background:var(--red);color:white}
.btn-ghost{background:white;color:var(--text);border-color:var(--border)}
.tools-menu{position:fixed;top:0;right:0;bottom:0;width:240px;background:white;box-shadow:-4px 0 32px rgba(0,0,0,.2);z-index:500;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-radius:16px 0 0 16px;overflow:hidden}
.tools-menu.open{transform:translateX(0)}
.menu-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:499;backdrop-filter:blur(2px)}
.menu-overlay.open{display:block}
.tools-menu-header{background:var(--dark);color:white;padding:18px 18px 16px;font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.tools-menu-close{background:rgba(255,255,255,.12);border:none;color:white;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;transition:background .15s}
.tools-menu-close:hover{background:rgba(255,255,255,.2)}
.tools-menu-grid{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:6px 0}
.tool-item{display:flex;align-items:center;gap:14px;padding:14px 20px;background:white;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;color:var(--text);text-align:right;border-bottom:1px solid #f1f5f9;transition:background .12s;width:100%}
.tool-item:hover{background:#f8fafc}
.tool-item:active{background:#eff6ff}
.tool-icon{font-size:22px;width:28px;text-align:center}
.tool-name{flex:1}
.filter-bar{background:#f1f5f9;padding:5px 10px;display:flex;gap:5px;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-btn{padding:4px 12px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;background:white;white-space:nowrap;font-family:inherit;transition:all .15s}
.filter-btn.active{color:white;border-color:transparent}
.filter-btn[data-f="الكل"].active{background:var(--dark)}
.filter-btn[data-f="جاهز"].active{background:var(--green)}
.filter-btn[data-f="تم الشحن"].active{background:var(--blue)}
.filter-btn[data-f="تالف"].active{background:var(--red)}
.filter-btn[data-f="مرتجع"].active{background:var(--orange)}
.filter-btn[data-f="مغلق"].active{background:#1e293b}
.table-wrapper{flex:1;overflow:auto;background:white;margin:6px;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.07);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;min-width:680px}
th{background:var(--dark);color:#94a3b8;font-weight:600;font-size:12px;padding:9px 10px;text-align:center;position:sticky;top:0;z-index:2}
th.col-main{color:white}
td{border-bottom:1px solid #f1f5f9;padding:8px 10px;text-align:center;font-size:13px;cursor:cell;font-family:inherit;transition:background .1s}
td:hover{background:#f8fafc}
td.selected-cell{outline:2px solid var(--blue);outline-offset:-2px;background:#eff6ff!important}
.row-num{background:#f8fafc;color:#94a3b8;font-size:11px;font-weight:600;width:32px}
tr.s-جاهز td:not(.row-num):not(.td-status){background:#f0fdf4}
tr.s-تم-الشحن td:not(.row-num):not(.td-status){background:#eff6ff}
tr.s-تالف td:not(.row-num):not(.td-status){background:#fff1f2}
tr.s-مرتجع td:not(.row-num):not(.td-status){background:#fff7ed}
tr.s-مغلق td{background:#1e293b!important;color:#94a3b8!important}
.td-date{color:#64748b;font-size:11.5px}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;user-select:none;font-family:inherit;transition:opacity .15s}
.status-badge:hover{opacity:.82}
.badge-جاهز{background:#dcfce7;color:#15803d}
.badge-تم-الشحن{background:#dbeafe;color:#1d4ed8}
.badge-تالف{background:#fee2e2;color:#b91c1c}
.badge-مرتجع{background:#ffedd5;color:#c2410c}
.badge-مغلق{background:#1e293b;color:white}
.formula-bar{display:flex;align-items:center;background:white;padding:4px 10px;border-bottom:1px solid var(--border);gap:8px;flex-shrink:0}
.cell-ref{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px 10px;font-weight:700;min-width:46px;text-align:center;font-size:13px;color:var(--blue)}
.formula-input{flex:1;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.formula-input:focus{border-color:var(--blue)}
.brand-tabs{background:#f1f5f9;display:flex;align-items:flex-end;border-top:1px solid var(--border);padding:0 8px;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.brand-tabs::-webkit-scrollbar{display:none}
.brand-tab{padding:7px 13px;background:#e2e8f0;border:1px solid #cbd5e1;border-bottom:none;border-radius:8px 8px 0 0;margin:3px 2px 0;cursor:pointer;font-weight:700;font-size:12.5px;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.brand-tab.active{background:white;color:var(--blue)}
.brand-tab .del-tab{cursor:pointer;color:var(--red);font-size:11px;padding:0 2px}
.tab-count{background:var(--blue);color:white;border-radius:8px;font-size:10px;padding:1px 5px}
.add-brand-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:5px 10px;color:var(--blue);font-weight:bold;flex-shrink:0}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal.active{display:flex}
.modal-box{background:white;border-radius:16px;padding:24px;max-width:520px;width:95%;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto;animation:modalIn .2s ease}
.modal-box h3{font-size:17px;margin-bottom:16px;color:var(--dark);font-weight:800}
.modal-close{display:inline-block;margin-top:14px;margin-left:8px;background:#e2e8f0;color:var(--text);border:none;padding:9px 22px;border-radius:8px;cursor:pointer;font-weight:700;font-size:13px;font-family:inherit;transition:background .15s}
.modal-close:hover{background:#cbd5e1}
.modal-close.primary{background:var(--blue);color:white}
.modal-close.primary:hover{background:#1d4ed8}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0}
.stat-card{border-radius:12px;padding:14px 8px;text-align:center}
.stat-num{font-size:28px;font-weight:900}
.stat-label{font-size:11px;margin-top:3px;opacity:.7;font-weight:600}
.sc-total{background:#eff6ff}.sc-total .stat-num{color:var(--blue)}
.sc-ready{background:#f0fdf4}.sc-ready .stat-num{color:var(--green)}
.sc-ship{background:#eff6ff}.sc-ship .stat-num{color:var(--blue)}
.sc-dmg{background:#fff1f2}.sc-dmg .stat-num{color:var(--red)}
.sc-ret{background:#fff7ed}.sc-ret .stat-num{color:var(--orange)}
.sc-pallets{background:#f5f3ff}.sc-pallets .stat-num{color:#7c3aed}
.log-entry{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:12.5px;align-items:flex-start}
.log-entry:last-child{border-bottom:none}
.log-time{color:#94a3b8;white-space:nowrap;font-size:11px;min-width:80px}
.log-user{font-weight:800;color:var(--blue);min-width:60px}
.log-action{color:#475569;flex:1}
.log-type{padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap}
.log-add{background:#dcfce7;color:#15803d}
.log-edit{background:#dbeafe;color:#1d4ed8}
.log-delete{background:#fee2e2;color:#b91c1c}
.log-status{background:#ffedd5;color:#c2410c}
.log-system{background:#f1f5f9;color:#475569}
.install-banner{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--dark);color:white;padding:12px 16px;align-items:center;justify-content:space-between;z-index:800}
.install-banner.show{display:flex}
.install-btn{background:var(--blue);border:none;color:white;padding:7px 16px;border-radius:7px;font-weight:700;cursor:pointer;font-family:inherit}
.sync-config-row{display:flex;gap:8px;align-items:center;margin:10px 0;font-size:14px;font-weight:600}
.sync-config-row input[type=text]{flex:1;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:inherit;outline:none}
.sync-config-row label{min-width:130px}
button:disabled{opacity:.35;cursor:not-allowed}
</style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">📡 أنت غير متصل بالإنترنت — التطبيق يعمل محليًا</div>

<div id="nameScreen">
  <div class="ns-logo">📦</div>
  <div class="ns-title">Second Grade</div>
  <div class="ns-sub">نظام إدارة المخزن</div>
  <div class="ns-box">
    <label class="ns-label">👤 اسم المستخدم</label>
    <input type="text" id="nameInput" class="ns-input" placeholder="أدخل اسمك..." autofocus>
    <label class="ns-label">🔑 كود الغرفة <span style="font-weight:400;color:#64748b">(اختياري — للمزامنة المشتركة)</span></label>
    <input type="text" id="roomCodeInput" class="ns-input" placeholder="مثال: STORE01" style="letter-spacing:2px;text-transform:uppercase">
    <button class="ns-btn" id="nameEnterBtn">دخول</button>
    <div class="ns-error" id="nameError"></div>
  </div>
</div>

<header class="app-header" id="appHeader" style="display:none;">
  <div class="header-title">📦 Second Grade <span style="font-size:11px;font-weight:600;color:#64748b;margin-right:6px;">by MohamadZedan</span></div>
  <div class="header-right">
    <div class="sync-indicator" id="syncIndicator"><span class="sync-dot" id="syncDot"></span><span id="syncText">محلي</span></div>
    <div class="header-user-chip"><span>👤</span><span id="displayName"></span></div>
  </div>
</header>

<div class="notif-banner" id="notifBanner"><span>⚠️</span><span id="notifMsg"></span><span class="notif-dismiss" onclick="this.parentElement.classList.remove('show')">✕</span></div>

<div class="search-bar" id="searchBar" style="display:none;">
  <input type="text" id="searchInput" placeholder="🔍 بحث في الجدول...">
  <button class="search-clear" id="searchClearBtn">✕ مسح</button>
  <span class="search-count" id="searchCount"></span>
</div>

<div class="toolbar" id="toolbar" style="display:none;">
  <div class="toolbar-top-row">
    <button class="menu-toggle-btn" id="menuToggleBtn"><span class="btn-icon">☰</span><span class="btn-lbl">أدوات</span></button>
    <button class="btn-primary" id="syncNowBtn"><span class="btn-icon">🔄</span><span class="btn-lbl">مزامنة</span></button>
    <button class="btn-success" id="palletBtn"><span class="btn-icon">📦</span><span class="btn-lbl">بالطة ×20</span></button>
    <button class="btn-danger" id="deleteSelectedBtn" disabled><span class="btn-icon">🗑️</span><span class="btn-lbl">حذف</span></button>
  </div>
</div>

<div class="menu-overlay" id="menuOverlay"></div>
<div class="tools-menu" id="toolsMenu">
  <div class="tools-menu-header"><span>🛠️ الأدوات</span><button class="tools-menu-close" id="menuCloseBtn">✕</button></div>
  <div class="tools-menu-grid">
    <button class="tool-item" data-action="addRow"><span class="tool-icon">➕</span><span class="tool-name">إضافة صف</span></button>
    <button class="tool-item" data-action="addBrand"><span class="tool-icon">🏷️</span><span class="tool-name">إضافة ماركة</span></button>
    <button class="tool-item" data-action="showStats"><span class="tool-icon">📊</span><span class="tool-name">إحصائيات</span></button>
    <button class="tool-item" data-action="showLog"><span class="tool-icon">📋</span><span class="tool-name">سجل التعديلات</span></button>
    <button class="tool-item" data-action="exportData"><span class="tool-icon">📥</span><span class="tool-name">تصدير البيانات</span></button>
    <button class="tool-item" data-action="importData"><span class="tool-icon">📤</span><span class="tool-name">استيراد بيانات</span></button>
    <button class="tool-item" data-action="closeAll"><span class="tool-icon">🔒</span><span class="tool-name">إغلاق الكل</span></button>
    <button class="tool-item" data-action="resetData"><span class="tool-icon">⚠️</span><span class="tool-name">مسح البيانات</span></button>
    <button class="tool-item" data-action="syncConfig"><span class="tool-icon">⚙️</span><span class="tool-name">إعدادات المزامنة</span></button>
    <button class="tool-item" data-action="installApp" id="installMenuBtn" style="display:none;"><span class="tool-icon">📲</span><span class="tool-name">تثبيت التطبيق</span></button>
  </div>
</div>

<div class="filter-bar" id="filterBar" style="display:none;">
  <button class="filter-btn active" data-f="الكل">الكل</button>
  <button class="filter-btn" data-f="جاهز">جاهز</button>
  <button class="filter-btn" data-f="تم الشحن">تم الشحن</button>
  <button class="filter-btn" data-f="تالف">تالف</button>
  <button class="filter-btn" data-f="مرتجع">مرتجع</button>
  <button class="filter-btn" data-f="مغلق">مغلق</button>
</div>

<div class="formula-bar" id="formulaBar" style="display:none;">
  <span class="cell-ref" id="cellRef">-</span>
  <input type="text" class="formula-input" id="formulaInput" placeholder="القيمة...">
</div>

<div class="table-wrapper" id="tableWrapper" style="display:none;">
  <table id="mainTable">
    <thead><tr>
      <th>#</th><th>التاريخ</th><th class="col-main">الماركة</th>
      <th>رقم البالت</th><th>الكرتون</th><th>الاستيل</th><th>ملاحظات</th><th>الحالة</th>
    </tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="brand-tabs" id="brandTabs" style="display:none;">
  <button class="brand-tab active" data-brand="الكل">الكل <span class="tab-count" id="tabCountAll">0</span></button>
  <button class="add-brand-btn" id="addBrandTabBtn">＋</button>
</div>

<div class="modal" id="genericModal"><div class="modal-box" id="modalContent"></div></div>
<div class="install-banner" id="installBanner"><span>📲 ثبّت التطبيق على جهازك</span><button class="install-btn" id="installBannerBtn">تثبيت</button></div>

<script>
// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(e) {
      console.log('SW registration failed (normal in dev):', e);
    });
  });
}

// PWA icons + manifest
(function(){
  function icon(s){var c=document.createElement("canvas");c.width=s;c.height=s;var x=c.getContext("2d");x.fillStyle="#0f172a";x.fillRect(0,0,s,s);x.fillStyle="#2563eb";x.fillRect(.1*s,.1*s,.8*s,.8*s);x.fillStyle="white";x.font="bold "+(.4*s)+"px Cairo,sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText("SG",s/2,s/2);return c.toDataURL("image/png")}
  var i192=icon(192),i512=icon(512);
  var lnk=document.createElement("link");lnk.rel="manifest";
  var mf={name:"Second Grade",short_name:"SG",description:"نظام إدارة المخزن",start_url:"./",display:"standalone",background_color:"#0f172a",theme_color:"#0f172a",orientation:"any",icons:[{src:i192,sizes:"192x192",type:"image/png"},{src:i512,sizes:"512x512",type:"image/png"}]};
  lnk.href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:"application/manifest+json"}));
  document.head.appendChild(lnk);
  var al=document.createElement("link");al.rel="apple-touch-icon";al.href=i192;document.head.appendChild(al);
})();

// Main app
!function(){
  var SD="sg_data",SL="sg_log",SB="sg_brands",SS="sg_sync";
  var user="",rows=[],log=[],brands=["الكل"];
  var activeBrand="الكل",activeFilter="الكل",searchQ="",selCell=null,installPrompt=null;
  var syncCfg={enabled:false,roomCode:"",autoSync:true};
  var isOnline=navigator.onLine;
  var bc=new BroadcastChannel("sg_sync");
  var notifT;
  var FB_BASE="https://sg-room-default-rtdb.firebaseio.com/rooms/";
  var fbListener=null,fbRoomCode="",fbLastTs=0;

  function load(){
    try{rows=JSON.parse(localStorage.getItem(SD))||[];}catch(e){rows=[];}
    try{brands=JSON.parse(localStorage.getItem(SB))||["الكل"];}catch(e){brands=["الكل"];}
    try{log=JSON.parse(localStorage.getItem(SL))||[];}catch(e){log=[];}
  }
  function save(){
    localStorage.setItem(SD,JSON.stringify(rows));
    localStorage.setItem(SB,JSON.stringify(brands));
    localStorage.setItem(SL,JSON.stringify(log));
  }
  function loadCfg(){try{syncCfg=JSON.parse(localStorage.getItem(SS))||syncCfg;}catch(e){}}
  function saveCfg(){localStorage.setItem(SS,JSON.stringify(syncCfg));}

  function addLog(type,details){
    log.unshift({time:new Date().toLocaleString("ar-EG"),user:user,type:type,details:details});
    if(log.length>200)log.pop();
    save();
  }

  function notify(msg,dur){
    dur=dur===undefined?3000:dur;
    document.getElementById("notifMsg").textContent=msg;
    document.getElementById("notifBanner").classList.add("show");
    clearTimeout(notifT);
    if(dur)notifT=setTimeout(function(){document.getElementById("notifBanner").classList.remove("show");},dur);
  }

  function syncUI(state){
    var dot=document.getElementById("syncDot"),txt=document.getElementById("syncText");
    if(!syncCfg.enabled||!fbRoomCode){dot.className="sync-dot";txt.textContent="بدون غرفة";return;}
    if(state==="syncing"){dot.className="sync-dot syncing";txt.textContent="جاري...";}
    else if(!isOnline){dot.className="sync-dot";txt.textContent="أوفلاين";}
    else{dot.className="sync-dot online";txt.textContent="غرفة: "+fbRoomCode;}
  }

  function bcast(action,payload){
    var msg={action:action,payload:payload,user:user,timestamp:Date.now()};
    bc.postMessage(msg);
    if(syncCfg.enabled&&fbRoomCode&&isOnline){fbPush(msg);}
  }

  function fbPush(msg){
    if(!fbRoomCode||!isOnline)return;
    syncUI("syncing");
    fetch(FB_BASE+fbRoomCode+"/events.json",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(msg)
    }).then(function(){
      // Also update state snapshot for new joiners
      fetch(FB_BASE+fbRoomCode+"/state.json",{
        method:"PUT",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({rows:rows,brands:brands,log:log.slice(0,50),ts:Date.now()})
      });
      syncUI();
    }).catch(function(){syncUI();});
  }

  function fbConnect(code){
    if(fbListener){clearInterval(fbListener);fbListener=null;}
    fbRoomCode=code;fbLastTs=Date.now();
    syncUI("syncing");
    // Poll every 3 seconds
    fbListener=setInterval(function(){fbPoll();},3000);
    fbPoll();
  }

  function fbPoll(){
    if(!fbRoomCode||!isOnline)return;
    fetch(FB_BASE+fbRoomCode+"/events.json?orderBy=\"timestamp\"&startAt="+fbLastTs+"&limitToLast=20")
      .then(function(r){return r.json();})
      .then(function(data){
        if(!data)return;
        Object.values(data).forEach(function(msg){
          if(msg.timestamp<=fbLastTs||msg.user===user)return;
          fbLastTs=Math.max(fbLastTs,msg.timestamp);
          applyMsg(msg);
        });
        syncUI();
      }).catch(function(){syncUI();});
  }

  function fbDisconnect(){
    if(fbListener){clearInterval(fbListener);fbListener=null;}
    fbRoomCode="";syncUI();
  }

  function applyMsg(d){
    var a=d.action,p=d.payload,u=d.user;
    if(u===user)return;
    if(a==="addRow")rows.push(p.row);
    else if(a==="updateRow"){if(rows[p.index])Object.assign(rows[p.index],p.row);}
    else if(a==="deleteRow"){if(p.index!=null)rows.splice(p.index,1);}
    else if(a==="changeStatus"){if(rows[p.index])rows[p.index].status=p.status;}
    else if(a==="syncAll"){rows=p.data;brands=p.brands||brands;log=p.log||log;}
    else if(a==="closeAll"){rows.forEach(function(r){r.status="مغلق";});}
    else if(a==="resetData"){rows=[];brands=["الكل"];log=[];}
    save();render();syncUI();
    notify("🔄 تحديث من "+u,2000);
  }

  bc.onmessage=function(e){applyMsg(e.data);};

  function render(){
    var tbody=document.getElementById("tableBody");
    tbody.innerHTML="";
    var list=rows.slice();
    if(activeBrand!=="الكل")list=list.filter(function(r){return r.brand===activeBrand;});
    if(activeFilter!=="الكل")list=list.filter(function(r){return r.status===activeFilter;});
    if(searchQ){var q=searchQ.toLowerCase();list=list.filter(function(r){return Object.values(r).some(function(v){return v&&v.toString().toLowerCase().indexOf(q)>=0;});});}
    document.getElementById("searchCount").textContent=list.length+" / "+rows.length;
    list.forEach(function(row){
      var idx=rows.indexOf(row);
      var tr=document.createElement("tr");
      tr.className="s-"+row.status.replace(/ /g,"-");
      tr.dataset.index=idx;
      var sc="badge-"+row.status.replace(/ /g,"-");
      tr.innerHTML='<td class="row-num">'+(idx+1)+'</td><td class="td-date">'+(row.date||"")+'</td><td>'+(row.brand||"")+'</td><td>'+(row.pallet||"")+'</td><td>'+(row.qty||"")+'</td><td>'+(row.weight||"")+'</td><td>'+(row.notes||"")+'</td><td class="td-status"><span class="status-badge '+sc+'" data-index="'+idx+'">'+row.status+"</span></td>";
      tbody.appendChild(tr);
    });
    document.querySelectorAll(".status-badge").forEach(function(b){
      b.addEventListener("click",function(e){e.stopPropagation();cycleStatus(parseInt(this.dataset.index));});
    });
    renderTabs();renderFilters();save();
  }

  function cycleStatus(idx){
    var s=["جاهز","تم الشحن","تالف","مرتجع","مغلق"];
    rows[idx].status=s[(s.indexOf(rows[idx].status)+1)%s.length];
    addLog("status","تغيير حالة الصف "+(idx+1)+" إلى "+rows[idx].status);
    bcast("changeStatus",{index:idx,status:rows[idx].status});
    render();
  }

  function renderTabs(){
    var tabs=document.getElementById("brandTabs");
    tabs.querySelectorAll('.brand-tab:not([data-brand="الكل"])').forEach(function(t){t.remove();});
    brands.forEach(function(brand){
      if(brand==="الكل")return;
      var btn=document.createElement("button");
      btn.className="brand-tab"+(brand===activeBrand?" active":"");
      btn.dataset.brand=brand;
      var cnt=rows.filter(function(r){return r.brand===brand;}).length;
      btn.innerHTML=brand+' <span class="tab-count">'+cnt+'</span> <span class="del-tab">✕</span>';
      btn.addEventListener("click",function(e){
        if(e.target.classList.contains("del-tab")){e.stopPropagation();delBrand(brand);return;}
        activeBrand=brand;
        document.querySelectorAll(".brand-tab").forEach(function(t){t.classList.remove("active");});
        btn.classList.add("active");render();
      });
      tabs.insertBefore(btn,document.getElementById("addBrandTabBtn"));
    });
    var allTab=tabs.querySelector('[data-brand="الكل"]');
    if(allTab){
      allTab.classList.toggle("active",activeBrand==="الكل");
      allTab.querySelector("#tabCountAll").textContent=rows.length;
    }
  }

  function delBrand(brand){
    if(!confirm('حذف ماركة "'+brand+'" وجميع صفوفها؟'))return;
    rows=rows.filter(function(r){return r.brand!==brand;});
    brands=brands.filter(function(b){return b!==brand;});
    if(activeBrand===brand)activeBrand="الكل";
    addLog("system","حذف ماركة "+brand);
    bcast("syncAll",{data:rows,brands:brands,log:log});
    render();
  }

  function renderFilters(){
    document.querySelectorAll(".filter-btn").forEach(function(btn){
      var f=btn.dataset.f;
      var cnt=f==="الكل"?rows.length:rows.filter(function(r){return r.status===f;}).length;
      btn.textContent=f+" ("+cnt+")";
    });
  }

  function addRow(brand){
    brand=brand||"عام";
    var row={date:new Date().toLocaleDateString("ar-EG"),brand:brand,pallet:"",qty:"",weight:"",notes:"",status:"جاهز"};
    rows.push(row);
    addLog("add","إضافة صف جديد ("+brand+")");
    bcast("addRow",{row:row});
    if(brands.indexOf(brand)<0){brands.push(brand);bcast("syncAll",{data:rows,brands:brands,log:log});}
    render();
  }

  // Login
  document.getElementById("nameEnterBtn").addEventListener("click",function(){
    var n=document.getElementById("nameInput").value.trim();
    if(!n){document.getElementById("nameError").textContent="الرجاء إدخال اسم المستخدم";return;}
    var rc=document.getElementById("roomCodeInput").value.trim().toUpperCase();
    user=n;
    document.getElementById("displayName").textContent=n;
    document.getElementById("nameScreen").classList.add("hidden");
    ["appHeader","searchBar","brandTabs"].forEach(function(id){document.getElementById(id).style.display="flex";});
    ["toolbar","filterBar","formulaBar","tableWrapper"].forEach(function(id){document.getElementById(id).style.display="block";});
    load();loadCfg();
    if(rc){
      syncCfg.enabled=true;
      syncCfg.roomCode=rc;
      saveCfg();
      fbConnect(rc);
      // Pull full state from Firebase on join
      fetch(FB_BASE+rc+"/state.json").then(function(r){return r.json();}).then(function(d){
        if(d&&d.rows){rows=d.rows;if(d.brands)brands=d.brands;if(d.log)log=d.log;save();}
        render();notify("✅ متصل بغرفة: "+rc);
      }).catch(function(){render();notify("✅ غرفة: "+rc+" — في انتظار بيانات");});
    } else {
      syncUI();render();
    }
    addLog("system","تسجيل دخول "+n+(rc?" (غرفة: "+rc+")":""));
  });
  document.getElementById("nameInput").addEventListener("keypress",function(e){if(e.key==="Enter")document.getElementById("nameEnterBtn").click();});

  // Side menu
  function closeMenu(){
    document.getElementById("toolsMenu").classList.remove("open");
    document.getElementById("menuOverlay").classList.remove("open");
    document.getElementById("menuToggleBtn").classList.remove("open");
  }
  document.getElementById("menuToggleBtn").addEventListener("click",function(){
    document.getElementById("toolsMenu").classList.toggle("open");
    document.getElementById("menuOverlay").classList.toggle("open");
    document.getElementById("menuToggleBtn").classList.toggle("open");
  });
  document.getElementById("menuCloseBtn").addEventListener("click",closeMenu);
  document.getElementById("menuOverlay").addEventListener("click",closeMenu);

  document.querySelector(".tools-menu-grid").addEventListener("click",function(e){
    var item=e.target.closest(".tool-item");if(!item)return;closeMenu();
    var act=item.dataset.action;
    if(act==="addRow"){addRow(activeBrand!=="الكل"?activeBrand:"");}
    else if(act==="addBrand"){var nm=prompt("اسم الماركة الجديدة:");if(nm&&brands.indexOf(nm)<0){brands.push(nm);addRow(nm);}}
    else if(act==="showStats"){showStats();}
    else if(act==="showLog"){showLog();}
    else if(act==="exportData"){doExport();}
    else if(act==="importData"){doImport();}
    else if(act==="closeAll"){rows.forEach(function(r){r.status="مغلق";});addLog("system","إغلاق جميع الصفوف");bcast("closeAll",{});render();}
    else if(act==="resetData"){if(confirm("مسح جميع البيانات؟ لا يمكن التراجع.")){rows=[];brands=["الكل"];log=[];save();bcast("resetData",{});activeBrand="الكل";render();}}
    else if(act==="syncConfig"){showSyncCfg();}
    else if(act==="installApp"){if(installPrompt)installPrompt.prompt();}
  });

  function showStats(){
    var t=rows.length,r=rows.filter(function(x){return x.status==="جاهز";}).length,
      sh=rows.filter(function(x){return x.status==="تم الشحن";}).length,
      d=rows.filter(function(x){return x.status==="تالف";}).length,
      re=rows.filter(function(x){return x.status==="مرتجع";}).length,
      cl=rows.filter(function(x){return x.status==="مغلق";}).length;
    document.getElementById("modalContent").innerHTML='<h3>📊 إحصائيات المخزن</h3><div class="stats-grid"><div class="stat-card sc-total"><div class="stat-num">'+t+'</div><div class="stat-label">إجمالي</div></div><div class="stat-card sc-ready"><div class="stat-num">'+r+'</div><div class="stat-label">جاهز</div></div><div class="stat-card sc-ship"><div class="stat-num">'+sh+'</div><div class="stat-label">تم الشحن</div></div><div class="stat-card sc-dmg"><div class="stat-num">'+d+'</div><div class="stat-label">تالف</div></div><div class="stat-card sc-ret"><div class="stat-num">'+re+'</div><div class="stat-label">مرتجع</div></div><div class="stat-card sc-pallets"><div class="stat-num">'+cl+'</div><div class="stat-label">مغلق</div></div></div><button class="modal-close" onclick="document.getElementById(\'genericModal\').classList.remove(\'active\')">إغلاق</button>';
    document.getElementById("genericModal").classList.add("active");
  }

  function showLog(){
    var html=log.slice(0,60).map(function(e){return '<div class="log-entry"><span class="log-time">'+e.time+'</span><span class="log-user">'+e.user+'</span><span class="log-type log-'+e.type+'">'+e.type+'</span><span class="log-action">'+e.details+'</span></div>';}).join("")||'<p style="color:#94a3b8;text-align:center;padding:20px">لا توجد سجلات</p>';
    document.getElementById("modalContent").innerHTML='<h3>📋 سجل التعديلات</h3><div style="max-height:60vh;overflow-y:auto;">'+html+'</div><button class="modal-close" onclick="document.getElementById(\'genericModal\').classList.remove(\'active\')">إغلاق</button>';
    document.getElementById("genericModal").classList.add("active");
  }

  function showSyncCfg(){
    document.getElementById("modalContent").innerHTML='<h3>⚙️ إعدادات المزامنة</h3><div class="sync-config-row"><label>تفعيل المزامنة</label><input type="checkbox" id="scEn" '+(syncCfg.enabled?"checked":"")+'></div><div class="sync-config-row"><label>رابط الخادم</label><input type="text" id="scUrl" value="'+(syncCfg.serverUrl||"")+'" placeholder="https://..."></div><div class="sync-config-row"><label>مزامنة تلقائية</label><input type="checkbox" id="scAuto" '+(syncCfg.autoSync?"checked":"")+'></div><button class="modal-close primary" id="scSave">حفظ</button><button class="modal-close" onclick="document.getElementById(\'genericModal\').classList.remove(\'active\')">إلغاء</button>';
    document.getElementById("genericModal").classList.add("active");
    document.getElementById("scSave").addEventListener("click",function(){
      syncCfg.enabled=document.getElementById("scEn").checked;
      syncCfg.serverUrl=document.getElementById("scUrl").value.trim();
      syncCfg.autoSync=document.getElementById("scAuto").checked;
      saveCfg();syncUI();
      document.getElementById("genericModal").classList.remove("active");
      notify("تم حفظ إعدادات المزامنة");
    });
  }

  // Cell editing
  document.getElementById("tableBody").addEventListener("click",function(e){
    var td=e.target.closest("td");
    if(!td||td.classList.contains("td-status")||td.classList.contains("row-num"))return;
    var idx=parseInt(td.parentElement.dataset.index);
    var cols=["date","brand","pallet","qty","weight","notes"];
    var ci=td.cellIndex-1;
    if(ci<0||ci>=cols.length)return;
    selCell={row:idx,col:cols[ci]};
    document.querySelectorAll(".selected-cell").forEach(function(c){c.classList.remove("selected-cell");});
    td.classList.add("selected-cell");
    document.getElementById("cellRef").textContent=(idx+1)+":"+cols[ci];
    document.getElementById("formulaInput").value=rows[idx][cols[ci]]||"";
    document.getElementById("deleteSelectedBtn").disabled=false;
  });

  document.getElementById("formulaInput").addEventListener("input",function(){
    if(!selCell)return;
    rows[selCell.row][selCell.col]=this.value;
    addLog("edit","تعديل "+selCell.col+" للصف "+(selCell.row+1));
    bcast("updateRow",{index:selCell.row,row:Object.assign({},rows[selCell.row])});
    render();
  });

  document.getElementById("deleteSelectedBtn").addEventListener("click",function(){
    if(!selCell||!confirm("حذف الصف المحدد؟"))return;
    var idx=selCell.row;
    addLog("delete","حذف الصف "+(idx+1));
    bcast("deleteRow",{index:idx});
    rows.splice(idx,1);
    selCell=null;
    document.getElementById("cellRef").textContent="-";
    document.getElementById("formulaInput").value="";
    document.getElementById("deleteSelectedBtn").disabled=true;
    render();
  });

  document.getElementById("syncNowBtn").addEventListener("click",function(){
    if(!syncCfg.enabled){notify("المزامنة غير مفعلة");return;}
    bcast("syncAll",{data:rows,brands:brands,log:log});syncUI();notify("🔄 تم بث البيانات");
  });

  function doExport(){
    var hdr=["التاريخ","الماركة","رقم البالت","الكرتون","الاستيل","ملاحظات","الحالة"];
    var csv=[hdr].concat(rows.map(function(r){return [r.date,r.brand,r.pallet,r.qty,r.weight,r.notes,r.status];}))
      .map(function(row){return row.map(function(v){return '"'+(v||"")+'"';}).join(",");}).join("\n");
    var a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
    a.download="secondgrade_"+new Date().toLocaleDateString("ar-EG").replace(/\//g,"-")+".csv";
    a.click();notify("✅ تم تصدير البيانات");
  }

  function doImport(){
    var inp=document.createElement("input");inp.type="file";inp.accept=".csv";
    inp.onchange=function(e){
      var reader=new FileReader();
      reader.onload=function(ev){
        var lines=ev.target.result.split("\n").filter(function(l){return l.trim();});
        var imported=[];
        for(var i=1;i<lines.length;i++){
          var cols=lines[i].split(",").map(function(v){return v.replace(/^"|"$/g,"").trim();});
          if(cols.length>=7)imported.push({date:cols[0],brand:cols[1],pallet:cols[2],qty:cols[3],weight:cols[4],notes:cols[5],status:cols[6]});
        }
        rows=imported;
        var set=["الكل"];imported.forEach(function(r){if(r.brand&&set.indexOf(r.brand)<0)set.push(r.brand);});
        brands=set;
        addLog("system","استيراد "+imported.length+" صف");
        bcast("syncAll",{data:rows,brands:brands,log:log});
        render();notify("✅ تم استيراد "+imported.length+" صف");
      };
      reader.readAsText(e.target.files[0]);
    };
    inp.click();
  }

  document.getElementById("exportBtn") && document.getElementById("exportBtn").addEventListener("click", doExport);
  document.getElementById("importBtn") && document.getElementById("importBtn").addEventListener("click", doImport);

  document.getElementById("palletBtn").addEventListener("click",function(){
    var brand=activeBrand!=="الكل"?activeBrand:"عام";
    var palletNo=prompt("رقم البالت:");
    if(palletNo===null)return;
    palletNo=palletNo.trim();
    var today=new Date().toLocaleDateString("ar-EG");
    if(brands.indexOf(brand)<0){brands.push(brand);}
    for(var i=1;i<=20;i++){
      var row={date:today,brand:brand,pallet:palletNo,qty:String(i),weight:"",notes:"",status:"جاهز"};
      rows.push(row);
      bcast("addRow",{row:row});
    }
    addLog("add","إضافة بالطة رقم "+palletNo+" - 20 صف ("+brand+")");
    bcast("syncAll",{data:rows,brands:brands,log:log});
    render();notify("📦 تم إضافة بالطة "+palletNo+" - 20 كرتون");
  });

  document.getElementById("searchInput").addEventListener("input",function(){
    searchQ=this.value;
    document.getElementById("searchClearBtn").style.display=searchQ?"inline-block":"none";
    render();
  });
  document.getElementById("searchClearBtn").addEventListener("click",function(){
    document.getElementById("searchInput").value="";searchQ="";
    document.getElementById("searchClearBtn").style.display="none";render();
  });

  document.getElementById("filterBar").addEventListener("click",function(e){
    if(!e.target.classList.contains("filter-btn"))return;
    activeFilter=e.target.dataset.f;
    document.querySelectorAll(".filter-btn").forEach(function(b){b.classList.remove("active");});
    e.target.classList.add("active");render();
  });

  document.querySelector('.brand-tab[data-brand="الكل"]').addEventListener("click",function(){
    activeBrand="الكل";
    document.querySelectorAll(".brand-tab").forEach(function(t){t.classList.remove("active");});
    this.classList.add("active");render();
  });

  document.getElementById("addBrandTabBtn").addEventListener("click",function(){
    var nm=prompt("اسم الماركة الجديدة:");
    if(nm&&brands.indexOf(nm)<0){brands.push(nm);addRow(nm);}
  });

  document.getElementById("genericModal").addEventListener("click",function(e){
    if(e.target===this)this.classList.remove("active");
  });

  window.addEventListener("online",function(){isOnline=true;document.getElementById("offlineBanner").classList.remove("show");syncUI();flush();});
  window.addEventListener("offline",function(){isOnline=false;document.getElementById("offlineBanner").classList.add("show");syncUI();});
  if(!navigator.onLine)document.getElementById("offlineBanner").classList.add("show");

  window.addEventListener("beforeinstallprompt",function(e){
    e.preventDefault();installPrompt=e;
    document.getElementById("installBanner").classList.add("show");
    document.getElementById("installMenuBtn").style.display="flex";
  });
  document.getElementById("installBannerBtn").addEventListener("click",function(){if(installPrompt)installPrompt.prompt();});

  loadCfg();syncUI();
}();
</script>
</body>
</html>
